# ============================================================================
# NanoLFA-Design — Conda Environment
# ============================================================================
# Usage:
#   mamba env create -f environment.yml
#   conda activate nanolfa
# ============================================================================

name: nanolfa
channels:
  - conda-forge
  - bioconda
  - pytorch
  - nvidia
  - defaults

dependencies:
  # --- Python runtime ---
  - python=3.10.14
  - pip>=24.0

  # --- CUDA / GPU ---
  - cudatoolkit=11.8
  - cudnn=8.9.7

  # --- Core scientific ---
  - numpy=1.26.4
  - scipy=1.13.0
  - pandas=2.2.2

  # --- Structural biology ---
  - biopython=1.83
  - biotite=0.41.0
  - prody=2.4.1
  - openmm=8.1.1
  - pdbfixer=1.9
  - pymol-open-source=2.5.0

  # --- Chemistry ---
  - rdkit=2024.03.3
  - openbabel=3.1.1

  # --- ML frameworks ---
  - pytorch::pytorch=2.3.0
  - pytorch::torchvision
  - tensorflow=2.16.1

  # --- Visualization ---
  - matplotlib=3.9.0
  - seaborn=0.13.2

  # --- Notebook ---
  - jupyterlab=4.2.0
  - ipywidgets=8.1.2
  - nglview=3.1.2

  # --- Dev tools ---
  - git
  - make
  - wget
  - aria2        # fast parallel downloads for AF databases

  # --- Pip-only packages ---
  - pip:
      - jax[cuda12]==0.4.28
      - dm-haiku==0.0.12
      - fair-esm==2.0.1
      - colabfold==1.5.5
      - proteinmpnn==1.0.1
      - freesasa==2.2.1
      - pdb2pqr==3.6.1
      - omegaconf==2.3.0
      - hydra-core==1.3.2
      - click==8.1.7
      - rich==13.7.1
      - wandb==0.17.0
      - plotly==5.22.0
      - dask==2024.5.0
      - ray==2.10.0
      - submitit==1.5.1
      - pytest==8.2.0
      - pytest-cov==5.0.0
      - mypy==1.10.0
      - ruff==0.4.4
      - meeko==0.5.0
